# Default configuration. Values can be overridden by environment variables.
# See .env.example for the list of env vars.

env: "local"          # local | dev | prod

http:
  host: "0.0.0.0"
  port: "8080"
  read_timeout: "5s"
  write_timeout: "10s"
  idle_timeout: "60s"
  shutdown_timeout: "10s"

db:
  host: "localhost"
  port: "5432"
  user: "postgres"
  password: "postgres"
  name: "subscriptions"
  sslmode: "disable"
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: "30m"
  migrations_path: "file://migrations"

log:
  level: "info"       # debug | info | warn | error
  format: "json"      # json | text
